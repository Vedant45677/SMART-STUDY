<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Smart Study Chat - Real-time collaboration with your study groups." />
  <title>Chat - Smart Study</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .chat-layout { display: flex; height: calc(100vh - 70px); overflow: hidden; }
    .chat-sidebar {
      width: 280px; flex-shrink: 0; border-right: 1px solid var(--border);
      background: var(--bg2); display: flex; flex-direction: column;
    }
    .chat-sidebar-header { padding: 1.25rem; border-bottom: 1px solid var(--border); }
    .chat-search { position: relative; }
    .chat-search input { width: 100%; padding: 8px 12px 8px 36px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 0.85rem; }
    .chat-search input:focus { outline: none; border-color: var(--primary); }
    .chat-search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 0.85rem; color: var(--text-dim); }
    .chat-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .chat-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition);
      position: relative;
    }
    .chat-item:hover { background: var(--bg3); }
    .chat-item.active { background: rgba(108,99,255,0.12); }
    .chat-item-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; font-weight: 700; color: white; }
    .chat-item-info { flex: 1; overflow: hidden; }
    .chat-item-name { font-weight: 600; font-size: 0.875rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item-preview { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .chat-item-time { font-size: 0.7rem; color: var(--text-dim); }
    .unread-badge { width: 18px; height: 18px; border-radius: 50%; background: var(--primary); color: white; font-size: 0.65rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    /* Chat Main */
    .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header {
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; background: var(--bg2);
    }
    .chat-header-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; color: white; }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-weight: 700; font-size: 1rem; }
    .chat-header-status { font-size: 0.75rem; color: var(--success); display: flex; align-items: center; gap: 5px; }
    .chat-header-status::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
    .chat-header-actions { display: flex; gap: 8px; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .msg-group { display: flex; gap: 10px; }
    .msg-group.self { flex-direction: row-reverse; }
    .msg-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--gradient); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; align-self: flex-end; }
    .msg-content { max-width: 65%; }
    .msg-sender { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 3px; }
    .msg-group.self .msg-sender { text-align: right; }
    .msg-bubble {
      padding: 10px 14px; border-radius: 18px;
      font-size: 0.9rem; line-height: 1.5; word-break: break-word;
    }
    .msg-group:not(.self) .msg-bubble {
      background: var(--card2); border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-group.self .msg-bubble {
      background: var(--gradient); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-time { font-size: 0.68rem; color: var(--text-dim); margin-top: 4px; }
    .msg-group.self .msg-time { text-align: right; }
    .date-divider { text-align: center; font-size: 0.75rem; color: var(--text-dim); margin: 0.5rem 0; position: relative; }
    .date-divider::before,.date-divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
    .date-divider::before { left: 0; } .date-divider::after { right: 0; }
    /* Chat Input */
    .chat-input-bar {
      padding: 1rem 1.5rem; border-top: 1px solid var(--border);
      background: var(--bg2); display: flex; align-items: center; gap: 10px;
    }
    .chat-input-wrapper { flex: 1; display: flex; align-items: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 24px; padding: 6px 16px; gap: 8px; transition: var(--transition); }
    .chat-input-wrapper:focus-within { border-color: var(--primary); }
    .chat-input { flex: 1; background: none; border: none; color: var(--text); font-size: 0.9rem; resize: none; outline: none; max-height: 120px; padding: 4px 0; font-family: inherit; }
    .chat-input::placeholder { color: var(--text-dim); }
    .chat-input-actions { display: flex; gap: 4px; }
    .chat-action-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.1rem; padding: 4px; border-radius: 6px; transition: var(--transition); }
    .chat-action-btn:hover { background: var(--bg3); color: var(--text); }
    .send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--gradient); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: var(--transition); flex-shrink: 0; }
    .send-btn:hover { transform: scale(1.1); box-shadow: var(--shadow); }
    /* Typing indicator */
    .typing-indicator { display: none; align-items: center; gap: 8px; padding: 0 1.5rem 0.5rem; }
    .typing-indicator.visible { display: flex; }
    .typing-dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); animation: blink 1.4s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0;transform:scale(0.6)} 40%{opacity:1;transform:scale(1)} }
    .typing-text { font-size: 0.75rem; color: var(--text-dim); }
    /* Members panel */
    .members-panel { width: 240px; border-left: 1px solid var(--border); background: var(--bg2); padding: 1.25rem; display: none; }
    .members-panel.open { display: block; }
    .members-panel-title { font-weight: 700; font-size: 0.875rem; margin-bottom: 1rem; }
    .member-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
    .member-row-name { font-size: 0.875rem; font-weight: 500; }
    .member-row-status { font-size: 0.72rem; color: var(--text-dim); }
    .online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
    @media(max-width:768px) { .chat-sidebar { width: 0; display: none; } .members-panel { display: none !important; } }
  </style>
</head>
<body>
  <div id="page-loader"><div class="loader-logo">📚 Smart Study</div><div class="loader-spinner"></div></div>
  <div id="toast-container"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">📚 Smart Study</a>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="groups.html">Groups</a>
      <a href="chat.html" class="active">Chat</a>
      <a href="tasks.html">Tasks</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle"></button>
      <div class="nav-avatar" id="user-avatar">AJ</div>
    </div>
    <div class="hamburger"><span></span><span></span><span></span></div>
  </nav>

  <div class="page-wrapper" style="padding-top:70px;">
    <div class="chat-layout">
      <!-- Chat Sidebar -->
      <div class="chat-sidebar">
        <div class="chat-sidebar-header">
          <h3 style="font-weight:700;margin-bottom:10px;">💬 Messages</h3>
          <div class="chat-search">
            <span class="chat-search-icon">🔍</span>
            <input type="text" placeholder="Search chats..." id="chat-search" oninput="filterChats()" />
          </div>
        </div>
        <div class="chat-list" id="chat-list"></div>
      </div>

      <!-- Chat Main -->
      <div class="chat-main">
        <div class="chat-header">
          <div class="chat-header-avatar" id="ch-avatar">⚙️</div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="ch-name">Advanced Algorithms</div>
            <div class="chat-header-status">8 members · 5 online</div>
          </div>
          <div class="chat-header-actions">
            <button class="btn btn-ghost btn-sm btn-icon" onclick="showToast('Video call coming soon!','info')" title="Video Call">📹</button>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="showToast('Screen share coming soon!','info')" title="Share Screen">🖥️</button>
            <button class="btn btn-ghost btn-sm btn-icon" onclick="toggleMembers()" title="Members">👥</button>
          </div>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="typing-indicator" id="typing-indicator">
          <div class="typing-dots"><span></span><span></span><span></span></div>
          <span class="typing-text" id="typing-text">Sarah K. is typing...</span>
        </div>

        <div class="chat-input-bar">
          <div class="chat-input-wrapper">
            <div class="chat-input-actions">
              <button class="chat-action-btn" onclick="showToast('File upload coming soon!','info')" title="Attach">📎</button>
              <button class="chat-action-btn" onclick="insertEmoji()" title="Emoji">😊</button>
            </div>
            <textarea class="chat-input" id="chat-input" placeholder="Type a message..." rows="1"></textarea>
          </div>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">➤</button>
        </div>
      </div>

      <!-- Members Panel -->
      <div class="members-panel" id="members-panel">
        <div class="members-panel-title">👥 Members (8)</div>
        <div id="members-list"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
  <script src="script.js"></script>
  <script src="api.js"></script>
  <script>
    if (!Session.requireAuth()) throw new Error('Not authenticated');
    const user = Session.getUser() || {};
    document.getElementById('user-avatar').textContent = user.avatar || '??';

    let chats = [];
    let messages = [];
    let selectedChat = null;
    let membersOpen = false;

    // Connect to Socket.io
    const socket = io('http://localhost:5000');

    // Register user with socket
    socket.on('connect', () => {
      socket.emit('register', {
        userId: user._id,
        name: user.name,
        avatar: user.avatar
      });
    });

    // Listen for new messages
    socket.on('newMessage', (msg) => {
      if (msg.groupId === selectedChat) {
        const now = new Date(msg.createdAt);
        messages.push({
          sender: msg.senderName,
          avatar: msg.senderAvatar || msg.senderName?.slice(0,2) || '??',
          text: msg.content,
          time: now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
          self: msg.senderId === user._id
        });
        renderMessages();
      }
    });

    // Typing indicator
    socket.on('userTyping', (data) => {
      const indicator = document.getElementById('typing-indicator');
      if (data.isTyping) {
        document.getElementById('typing-text').textContent = data.name + ' is typing...';
        indicator.classList.add('visible');
      } else {
        indicator.classList.remove('visible');
      }
    });

    // User joined/left notifications
    socket.on('userJoined', (data) => {
      showToast(data.message, 'info');
    });
    socket.on('userLeft', (data) => {
      showToast(data.message, 'info');
    });

    // Load groups for chat sidebar
    async function loadChatList() {
      const res = await GroupsAPI.getAll();
      if (res.success) {
        chats = res.groups
          .filter(g => (g.members || []).some(m => m._id === user._id))
          .map(g => ({
            _id: g._id,
            name: g.name,
            avatar: g.avatar || '📚',
            preview: g.subject || 'No messages yet',
            time: '',
            unread: 0,
            members: g.members || []
          }));
      }

      if (chats.length === 0) {
        document.getElementById('chat-list').innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted);font-size:0.85rem;">Join a group to start chatting!<br><a href="groups.html" style="color:var(--primary);">Browse Groups →</a></div>';
        document.getElementById('ch-name').textContent = 'No groups yet';
        return;
      }

      renderChatList();
      // Auto-select first chat
      if (!selectedChat && chats.length > 0) {
        selectChat(chats[0]._id);
      }
    }

    function renderChatList(search = '') {
      const list = document.getElementById('chat-list');
      const filtered = chats.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));
      list.innerHTML = filtered.map(c => `
        <div class="chat-item ${c._id === selectedChat ? 'active' : ''}" onclick="selectChat('${c._id}')">
          <div class="chat-item-avatar">${c.avatar}</div>
          <div class="chat-item-info">
            <div class="chat-item-name">${c.name}</div>
            <div class="chat-item-preview">${c.preview}</div>
          </div>
          <div class="chat-item-meta">
            <span class="chat-item-time">${c.time}</span>
            ${c.unread ? `<span class="unread-badge">${c.unread}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    function filterChats() {
      renderChatList(document.getElementById('chat-search').value);
    }

    async function selectChat(id) {
      // Leave previous room
      if (selectedChat) {
        socket.emit('leaveRoom', selectedChat);
      }

      selectedChat = id;
      const chat = chats.find(c => c._id === id);
      if (!chat) return;

      document.getElementById('ch-avatar').textContent = chat.avatar;
      document.getElementById('ch-name').textContent = chat.name;
      document.querySelector('.chat-header-status').innerHTML = `${chat.members?.length || 0} members`;
      renderChatList();

      // Join room via Socket.io
      socket.emit('joinRoom', id);

      // Load chat history from API
      const res = await ChatAPI.getHistory(id);
      if (res.success) {
        messages = res.messages.map(m => ({
          sender: m.senderName || 'Unknown',
          avatar: m.senderAvatar || m.senderName?.slice(0,2) || '??',
          text: m.content,
          time: new Date(m.createdAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
          self: (m.senderId?._id || m.senderId) === user._id
        }));
      } else {
        messages = [];
      }
      renderMessages();

      // Render members
      if (chat.members) {
        document.getElementById('members-list').innerHTML = chat.members.map(m => `
          <div class="member-row">
            <div class="avatar avatar-sm" style="background:var(--gradient);color:white">${m.avatar || m.name?.slice(0,2) || '??'}</div>
            <div style="flex:1;">
              <div class="member-row-name">${m.name}${m._id === user._id ? ' (You)' : ''}</div>
            </div>
          </div>
        `).join('');
        document.querySelector('.members-panel-title').textContent = `👥 Members (${chat.members.length})`;
      }
    }

    function renderMessages() {
      const container = document.getElementById('chat-messages');
      if (messages.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--text-muted);">No messages yet. Say hello! 👋</div>';
        return;
      }
      container.innerHTML = `<div class="date-divider">Today</div>` + messages.map(m => `
        <div class="msg-group ${m.self ? 'self' : ''}">
          <div class="msg-avatar" style="${m.self ? 'background:var(--gradient)' : ''}">${m.avatar}</div>
          <div class="msg-content">
            ${!m.self ? `<div class="msg-sender">${m.sender}</div>` : ''}
            <div class="msg-bubble">${m.text}</div>
            <div class="msg-time">${m.time}</div>
          </div>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }

    function toggleMembers() {
      membersOpen = !membersOpen;
      document.getElementById('members-panel').classList.toggle('open', membersOpen);
    }

    function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !selectedChat) return;

      // Send via Socket.io (server saves to DB and broadcasts)
      socket.emit('sendMessage', {
        groupId: selectedChat,
        content: text
      });

      input.value = '';
      input.style.height = 'auto';
    }

    function insertEmoji() {
      const emojis = ['😊','👍','🎯','💡','📚','🤔','✅','🔥','👏','😂'];
      const e = emojis[Math.floor(Math.random() * emojis.length)];
      const input = document.getElementById('chat-input');
      input.value += e; input.focus();
    }

    // Auto-resize textarea
    document.getElementById('chat-input').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      // Emit typing indicator
      socket.emit('typing', { groupId: selectedChat, isTyping: true });
      clearTimeout(this._typingTimeout);
      this._typingTimeout = setTimeout(() => {
        socket.emit('typing', { groupId: selectedChat, isTyping: false });
      }, 1500);
    });

    // Enter to send
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // Init
    loadChatList();
  </script>
</body>
</html>
